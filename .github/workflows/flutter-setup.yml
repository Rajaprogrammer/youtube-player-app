name: Create Flutter Project

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  create-flutter-project:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.5'
        
    - name: Create Flutter Project
      run: flutter create --org com.github.youtubeplayer youtube_player_app
      
    - name: Copy Project Files
      run: |
        cp -r youtube_player_app/* .
        cp -r youtube_player_app/.* . 2>/dev/null || true
        rm -rf youtube_player_app
        
    - name: Install Dependencies and Test
      run: |
        flutter pub get
        flutter analyze
        
    - name: Commit Project Structure
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Initial Flutter project structure" || exit 0
        git push
