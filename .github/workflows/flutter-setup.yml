name: Create Flutter Project

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  create-flutter-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.5'
        
    - name: Create Flutter Project
      run: |
        flutter create --org com.github.youtubeplayer .
        
    - name: Update pubspec.yaml
      run: |
        cat > pubspec.yaml << 'EOF'
name: youtube_player_app
description: A YouTube video player app with JSON configuration

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  youtube_player_iframe: ^4.1.1
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos.json
EOF

    - name: Create Directory Structure
      run: |
        mkdir -p lib/models
        mkdir -p lib/screens  
        mkdir -p lib/services
        mkdir -p assets

    - name: Create Main Dart File
      run: |
        cat > lib/main.dart << 'EOF'
import 'package:flutter/material.dart';
import 'screens/home_screen.dart';

void main() {
  runApp(const MyApp());
}

class MyApp extends StatelessWidget {
  const MyApp({super.key});

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      title: 'YouTube Video Player',
      theme: ThemeData(
        primarySwatch: Colors.red,
        useMaterial3: true,
      ),
      home: const HomeScreen(),
      debugShowCheckedModeBanner: false,
    );
  }
}
EOF

    - name: Create Video Model
      run: |
        cat > lib/models/video_model.dart << 'EOF'
class Video {
  final String name;
  final String url;

  Video({
    required this.name,
    required this.url,
  });

  factory Video.fromJson(Map<String, dynamic> json) {
    return Video(
      name: json['name'],
      url: json['url'],
    );
  }
}
EOF

    - name: Create JSON Loader Service
      run: |
        cat > lib/services/json_loader.dart << 'EOF'
import 'dart:convert';
import 'package:flutter/services.dart';
import '../models/video_model.dart';

class JsonLoader {
  static Future<List<Video>> loadVideos() async {
    try {
      final String jsonString = await rootBundle.loadString('assets/videos.json');
      final List<dynamic> jsonList = json.decode(jsonString);
      
      return jsonList.map((json) => Video.fromJson(json)).toList();
    } catch (e) {
      print('Error loading JSON: $e');
      return [];
    }
  }
}
EOF

    - name: Create Home Screen
      run: |
        cat > lib/screens/home_screen.dart << 'EOF'
import 'package:flutter/material.dart';
import '../models/video_model.dart';
import '../services/json_loader.dart';
import 'video_screen.dart';

class HomeScreen extends StatefulWidget {
  const HomeScreen({super.key});

  @override
  State<HomeScreen> createState() => _HomeScreenState();
}

class _HomeScreenState extends State<HomeScreen> {
  List<Video> _videos = [];
  bool _isLoading = true;

  @override
  void initState() {
    super.initState();
    _loadVideos();
  }

  Future<void> _loadVideos() async {
    final videos = await JsonLoader.loadVideos();
    setState(() {
      _videos = videos;
      _isLoading = false;
    });
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: const Text('YouTube Videos'),
        backgroundColor: Colors.red,
      ),
      body: _isLoading
          ? const Center(child: CircularProgressIndicator())
          : _videos.isEmpty
              ? const Center(child: Text('No videos found'))
              : ListView.builder(
                  itemCount: _videos.length,
                  itemBuilder: (context, index) {
                    final video = _videos[index];
                    return Card(
                      margin: const EdgeInsets.all(8.0),
                      child: ListTile(
                        leading: const Icon(Icons.play_circle_filled, color: Colors.red),
                        title: Text(
                          video.name,
                          style: const TextStyle(fontWeight: FontWeight.bold),
                        ),
                        subtitle: Text(video.url),
                        onTap: () {
                          Navigator.push(
                            context,
                            MaterialPageRoute(
                              builder: (context) => VideoScreen(video: video),
                            ),
                          );
                        },
                      ),
                    );
                  },
                ),
    );
  }
}
EOF

    - name: Create Video Screen
      run: |
        cat > lib/screens/video_screen.dart << 'EOF'
import 'package:flutter/material.dart';
import 'package:flutter/services.dart';
import 'package:youtube_player_iframe/youtube_player_iframe.dart';
import '../models/video_model.dart';

class VideoScreen extends StatefulWidget {
  final Video video;

  const VideoScreen({super.key, required this.video});

  @override
  State<VideoScreen> createState() => _VideoScreenState();
}

class _VideoScreenState extends State<VideoScreen> {
  late YoutubePlayerController _controller;

  @override
  void initState() {
    super.initState();
    
    // Set landscape orientation
    SystemChrome.setPreferredOrientations([
      DeviceOrientation.landscapeLeft,
      DeviceOrientation.landscapeRight,
    ]);

    // Extract video ID from URL
    final videoId = YoutubePlayerController.convertUrlToId(widget.video.url) ?? '';
    
    _controller = YoutubePlayerController(
      params: const YoutubePlayerParams(
        showControls: true,
        showFullscreenButton: true,
        autoPlay: true,
      ),
    )..loadVideoById(videoId: videoId);
  }

  @override
  void dispose() {
    // Reset to portrait orientation
    SystemChrome.setPreferredOrientations([
      DeviceOrientation.portraitUp,
      DeviceOrientation.portraitDown,
    ]);
    _controller.close();
    super.dispose();
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      body: SafeArea(
        child: YoutubePlayerScaffold(
          controller: _controller,
          builder: (context, player) {
            return Column(
              children: [
                Expanded(
                  child: player,
                ),
                Padding(
                  padding: const EdgeInsets.all(8.0),
                  child: Row(
                    children: [
                      IconButton(
                        icon: const Icon(Icons.arrow_back),
                        onPressed: () => Navigator.pop(context),
                      ),
                      Expanded(
                        child: Text(
                          widget.video.name,
                          style: const TextStyle(
                            fontSize: 16,
                            fontWeight: FontWeight.bold,
                          ),
                        ),
                      ),
                    ],
                  ),
                ),
              ],
            );
          },
        ),
      ),
    );
  }
}
EOF

    - name: Create JSON Data File
      run: |
        cat > assets/videos.json << 'EOF'
[
